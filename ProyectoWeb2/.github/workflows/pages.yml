name: VITE MPA Despliegue de Portal a Github Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

env:
  DEPLOY_BASE_URL: ${{ vars.DEPLOY_BASE_URL }}

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ProyectoWeb2
    steps:
      - name: Clonar el Repositorio
        uses: actions/checkout@v4

      - name: Instalar Nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar las Dependencias del Proyecto
        run: npm install

      - name: Compilar la página para distribución
        run: npm run build

      - name: Configura Github Pages
        uses: actions/configure-pages@v5

      - name: Subir los compilados (artefactos) a GP
        uses: actions/upload-pages-artifact@v3
        with:
          path: './ProyectoWeb2/dist'

      - name: Publicar Github Pages
        id: deployment
        uses: actions/deploy-pages@v4